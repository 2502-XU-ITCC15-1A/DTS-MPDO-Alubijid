[build]
  command = "npm run build:client"
  publish = "dist/spa"

# Proxy /api/* to the Render backend — replace the URL below with your Render service URL
[[redirects]]
  from = "/api/*"
  to = "https://dts-mpdo-alubijid.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last, catches all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
